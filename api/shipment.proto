syntax= "proto3";

package shipment;

option go_package = "shipmentVektor/api/shipment;shipment";

service ShipmentService {
  rpc CreateShipment (CreateShipmentRequest) returns (CreateShipmentResponse);
  rpc GetShipment(GetShipmentRequest) returns (GetShipmentResponse);
  rpc AddEvent(AddEventRequest) returns (AddEventResponse);
  rpc GetShipmentHistory (GetShipmentHistoryRequest) returns (GetShipmentHistoryResponse);
}

enum Status {
  PENDING = 0;
  SHIPPED = 1;
  ON_THE_WAY = 2;
  DELIVERED = 3;
}

message Shipment {
  string id = 1;
  int32 reference = 2;
  string origin = 3;
  string destination = 4;
  Status status = 5;
  double cost = 6;
  double driver_revenue = 7;
}

message Event {
  Status status = 1;
  int64 timestamp = 2;
}

message CreateShipmentRequest {
  string id = 1;
  int32 reference = 2;
  string origin = 3;
  string destination = 4;
  double cost = 5;
  double driver_revenue = 6;
}
message CreateShipmentResponse {
  Shipment shipment = 1;
}

message GetShipmentRequest {
  string id = 1;
}
message GetShipmentResponse {
  Shipment shipment = 1;
}   

message AddEventRequest {
  string id = 1;
  Status status = 2;
}
message AddEventResponse {
  Shipment shipment = 1;
}

message GetShipmentHistoryRequest {
  string id = 1;
}
message GetShipmentHistoryResponse {
  repeated Event events = 1;
}